<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Standard Service Admin Console</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; }

      .nav-tabs { display: flex; gap: 8px; flex-wrap: wrap; }

      .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      .four-col { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; }
      .page-wrap { padding: 24px; max-width: 1200px; margin: 0 auto; }

      @media (max-width: 768px) {
        .two-col { grid-template-columns: 1fr !important; }
        .page-wrap { padding: 12px; }
        .nav-header { flex-direction: column; align-items: flex-start !important; gap: 10px; }
        .nav-tabs { width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
        .nav-tabs button { flex-shrink: 0; font-size: 12px !important; padding: 6px 10px !important; }
        .ticket-meta { grid-template-columns: 1fr !important; }
        .hide-mobile { display: none !important; }
      }

      @media (max-width: 480px) {
        .four-col { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
