version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: helpdesk-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - helpdesk-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  backend:
    build: ./backend
    container_name: helpdesk-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - helpdesk-net

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_ADMIN_TOKEN=${ADMIN_SECRET}
    container_name: helpdesk-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - helpdesk-net
      - management_xtech_net

volumes:
  db_data:

networks:
  helpdesk-net:
    driver: bridge
  management_xtech_net:
    external: true
